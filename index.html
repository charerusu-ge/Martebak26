    function jadwal(){shell(`<section class="card"><div class="head"><h2>Jadwal Pertandingan</h2><select id="week">${weeks.map(x=>`<option value="${x.id}" ${x.id===state.week?"selected":""}>${x.name} - ${x.label}</option>`).join("")}</select></div><div class="body note">Jadwal dalam zona waktu WIB. Prediksi pasaran adalah referensi skor pasar, bukan ajakan taruhan.</div><div class="body stack">${wm().map(m=>`<article class="match"><div class="team"><strong>#${esc(m.matchNumber||m.id)} ${teamLabel(m.home)}</strong><span class="meta">${esc(m.phase||m.group)} · ${esc(m.venue||"")}</span><span class="meta">${marketText(m)}</span></div><div class="mid"><span>${m.date}</span><span>${m.time||""} ${m.timezone||"WIB"}</span><span class="actual">${actualText(state.actual[m.id])}</span><button class="btn secondary summaryBtn" data-summary="${esc(m.id)}">Summary</button></div><div class="team away"><strong>${teamLabel(m.away)}</strong><span class="meta">${state.marketPrediction?.[m.id]?.score?"Prediksi pasaran tersedia":"Prediksi pasaran belum tersedia"}</span></div></article>`).join("")}</div></section>`);document.querySelector("#week").onchange=e=>{state.week=e.target.value;render()};document.querySelectorAll(".summaryBtn").forEach(b=>b.onclick=()=>openSummary(b.dataset.summary))}
    function klasemen(){let r=rows();shell(`<section class="card"><div class="head"><h2>Klasemen dan Peserta Terdaftar</h2><button class="btn secondary" id="refreshRows">Muat Ulang Peserta</button><span class="pill">${r.length} peserta</span></div><div class="body note">Data peserta dibaca dari mini tabel teks server dan disinkronkan ke klasemen.</div><table><thead><tr><th>Rank</th><th>Peserta</th><th>Telegram</th><th>Status</th><th>Prediksi</th><th>Tepat</th><th>Salah</th><th>Poin</th></tr></thead><tbody>${r.length?r.map(x=>`<tr><td>#${x.rank}</td><td>${esc(x.name)}</td><td>${esc(x.phone||"-")}</td><td>${state.telegram[x.name]?.verified?"<span class='ok'>Terverifikasi</span>":"<span class='wait'>Belum cek</span>"}</td><td>${x.total}</td><td>${x.correct}</td><td>${x.wrong}</td><td><b>${x.points}</b></td></tr>`).join(""):`<tr><td colspan="8" class="wait">Belum ada peserta terdaftar.</td></tr>`}</tbody></table></section>`);document.querySelector("#refreshRows").onclick=()=>loadRemote().then(render)}
    function hasil(){let names=rows().map(r=>r.name);shell(`<section class="card"><div class="head"><h2>Hasil Prediksi Per Peserta</h2></div><div class="body note">Prediksi per peserta baru ditampilkan setelah deadline tiap pertandingan, yaitu 1 jam sebelum kickoff.</div><table><thead><tr><th>Pertandingan</th><th>Skor Aktual</th>${names.map(n=>`<th>${esc(n)}</th>`).join("")}</tr></thead><tbody>${allMatches().map(m=>{let visible=matchLocked(m);return `<tr><td>${teamLabel(m.home)} vs ${teamLabel(m.away)}<br><span class="meta">${m.date} ${m.time} WIB</span></td><td>${actualText(state.actual[m.id])}</td>${names.map(n=>{if(!visible)return `<td class="wait">Terkunci sampai H-1 jam kickoff</td>`;let p=preds(n)[m.id],a=state.actual[m.id],s=predScore(p,a),c=s.type==="exact"||s.type==="outcome"?"ok":(p&&a?.final?"bad":"wait");return `<td class="${c}">${p?`${p.home}-${p.away}${a?.final?` (+${s.points})`:""}`:"-"}</td>`}).join("")}</tr>`}).join("")}</tbody></table></section>`)}
    function rekap(){let ranking=rows(),rankByName=Object.fromEntries(ranking.map(r=>[r.name,r.rank])),items=[];allMatches().forEach(m=>{let a=state.actual[m.id];if(!a?.final)return;ranking.forEach(r=>{let p=preds(r.name)[m.id],s=predScore(p,a);if(s.points>0)items.push({match:m,user:r,p,a,s})})});shell(`<section class="card"><div class="head"><h2>Rekap Poin Per Pertandingan</h2><span class="pill">${items.length} hasil berpoin</span></div><div class="body note">Rekonsiliasi menampilkan prediksi yang mendapat poin: +3 untuk skor tepat, +1 untuk arah pemenang/seri tepat.</div><table><thead><tr><th>Pertandingan</th><th>Peserta</th><th>Prediksi</th><th>Skor Aktual</th><th>Jenis</th><th>Poin</th><th>Rank Saat Ini</th></tr></thead><tbody>${items.length?items.map(item=>`<tr><td>${teamLabel(item.match.home)} vs ${teamLabel(item.match.away)}<br><span class="meta">${item.match.date}</span></td><td>${esc(item.user.name)}</td><td>${item.p.home}-${item.p.away}</td><td>${item.a.home}-${item.a.away}</td><td>${item.s.type==="exact"?"Skor tepat":"Arah tepat"}</td><td class="ok">+${item.s.points}</td><td>#${rankByName[item.user.name]||"-"}</td></tr>`).join(""):`<tr><td colspan="7" class="wait">Belum ada prediksi berpoin dari pertandingan yang sudah selesai.</td></tr>`}</tbody></table></section>`)}
    function sendWebCheck(){pop("Notifikasi sekarang hanya tampil di web aplikasi.")}
    function confirmWebCheck(e){e.preventDefault();pop("Konfirmasi eksternal sudah dinonaktifkan.")}
    function notif(){if(state.user.role==="viewer"){state.page="jadwal";return jadwal()}let up=allMatches().filter(m=>!state.actual[m.id]?.final).slice(0,6),rec=state.telegram[state.user.name]||{};shell(`<section class="grid"><div class="card"><div class="head"><h2>Notifikasi Telegram</h2><span class="pill">${rec.verified?"terverifikasi":"perlu konfirmasi"}</span></div><div class="body stack"><p class="note">Nomor Telegram tersimpan: <b>${esc(state.user.phone||"-")}</b>. Tekan kirim kode, lalu masukkan kode yang diterima. Untuk versi lokal ini kode ditampilkan sebagai toast simulasi; integrasi bot Telegram asli membutuhkan token bot dan chat id.</p><div class="verify"><button class="btn" id="sendCode">Kirim Kode Konfirmasi</button><form id="confirmTelegram" class="verify"><input name="code" placeholder="Kode 6 digit"><button class="btn secondary">Verifikasi</button></form></div>${(state.notif.length?state.notif:[{text:"Belum ada tebakan tepat yang memicu notifikasi."}]).map(n=>`<p class="note">${esc(n.text)}</p>`).join("")}</div></div><aside class="card"><div class="head"><h2>Pengingat Jadwal</h2></div><div class="body stack">${up.map(m=>`<p class="note">${m.date} ${m.time} WIB · ${teamLabel(m.home)} vs ${teamLabel(m.away)}</p>`).join("")}</div></aside></section>`);document.querySelector("#sendCode").onclick=sendTelegramCode;document.querySelector("#confirmTelegram").addEventListener("submit",confirmTelegram)}
    function referensi(){let refs=[["FIFA+ World Cup 2026","Video resmi, cerita turnamen, dan konten World Cup 2026 dari FIFA+.","https://www.plus.fifa.com/en/showcase/inside-world-cup/a4f09830-6912-4d26-9f74-4cb3a2237099"],["FIFA Archive Highlights","Arsip cuplikan dan extended highlights Piala Dunia resmi FIFA.","https://www.archives.fifa.com/extended_highlights"],["FOX Sports Highlights","Halaman highlight dan cuplikan pertandingan World Cup 2026 dari broadcaster publik.","https://www.foxsports.com/soccer/fifa-world-cup/highlights"],["YouTube FIFA","Cari cuplikan resmi, goal, Shorts, dan konten partner World Cup 2026 di YouTube.","https://www.youtube.com/results?search_query=FIFA+World+Cup+2026+highlights+goals"]];shell(`<section class="card"><div class="head"><h2>Referensi Video Cuplikan dan Goal</h2><span class="pill">public web</span></div><div class="body ref-grid">${refs.map(([title,desc,url])=>`<a class="ref-card" href="${url}" target="_blank" rel="noopener noreferrer"><b>${esc(title)}</b><span class="note">${esc(desc)}</span><span class="meta">${esc(url)}</span></a>`).join("")}</div></section>`)}
    async function runSync(){try{let r=await fetch("/api/sync/run",{method:"POST",headers:authHeaders()}),d=await r.json();pop(d.lastError?`Sync error: ${d.lastError}`:`Sync selesai: ${d.updatedMatches} match`);await loadRemote();render()}catch{pop("Sync sumber eksternal gagal dijalankan")}}
    async function runScoreSync(){try{let r=await fetch("/api/score/run",{method:"POST",headers:authHeaders()}),d=await r.json();pop(d.lastError?`Sync skor error: ${d.lastError}`:`Sync skor update: ${d.updatedScores} skor`);await loadRemote();render()}catch{pop("Sync skor gagal dijalankan")}}
    async function runMarket(){try{let r=await fetch("/api/market/run",{method:"POST",headers:authHeaders()}),d=await r.json();pop(d.lastError?`Market error: ${d.lastError}`:`Market prediction: ${d.updated||0} update`);await loadRemote();render()}catch{pop("Sync market prediction gagal dijalankan")}}
    function admin(){if(state.user.role!=="admin")return prediksi();shell(`<section class="card"><div class="head"><h2>Sync Jadwal dan Update Skor Aktual</h2><div class="tools"><button class="btn secondary" id="syncFifa">Sync Jadwal / Skor</button><button class="btn secondary" id="syncScore">Sync Skor Sekarang</button><button class="btn secondary" id="syncMarket">Sync Prediksi Pasaran</button></div><span class="pill">admin</span></div><div class="body note">Server otomatis menyinkronkan jadwal, skor aktual, dan prediksi pasaran. Prediksi pasaran ditampilkan sebagai referensi skor pasar, bukan ajakan taruhan.</div><form id="actualForm" class="body">${allMatches().map(m=>{let a=state.actual[m.id]||{},mk=state.marketPrediction?.[m.id];return `<div class="admin-row"><label>#${esc(m.matchNumber||m.id)} ${teamLabel(m.home)} vs ${teamLabel(m.away)}<span class="meta">${m.date} ${m.time||""} ${m.timezone||"WIB"} · ${esc(m.phase||m.group)} · ${esc(m.venue||"")}</span><span class="meta">${marketText(m)}</span></label><label>Home<input name="${m.id}-ah" type="number" min="0" max="99" value="${a.home??""}"></label><label>Away<input name="${m.id}-aa" type="number" min="0" max="99" value="${a.away??""}"></label><label><input name="${m.id}-fin" type="checkbox" ${a.final?"checked":""}> Final</label></div>`}).join("")}<button class="btn">Simpan Skor Aktual dan Hitung Poin</button></form></section>`);document.querySelector("#actualForm").addEventListener("submit",saveActual);document.querySelector("#syncFifa").onclick=runSync;document.querySelector("#syncScore").onclick=runScoreSync;document.querySelector("#syncMarket").onclick=runMarket}
    function loginView(){stopSessionTimers();root.innerHTML=`<main class="app"><section class="home"><div class="home-hero"><div class="home-copy"><p class="kicker">Road to FIFA World Cup 2026</p><h1 class="home-title">Road to <span>Kickoff</span></h1><p class="home-sub">Hitung mundur menuju pertandingan pembuka Piala Dunia 2026. Siapkan prediksi skor mingguan, pantau jadwal, dan kejar peringkat Martebak26 sejak laga pertama.</p><div class="countdown" id="countdown"></div><p class="kickoff">Kickoff pertama: 11 Juni 2026, 20.00 WIB · Mexico vs South Africa</p></div><div class="mascot-stage"><div class="route"></div><div class="trophy"></div><div class="mascot maple" data-code="CAN"></div><div class="mascot jaguar" data-code="MEX"></div><div class="mascot eagle" data-code="USA"></div><div class="ball"></div></div></div><section class="login"><div class="brand"><div class="mark">M26</div><div><h1>Martebak26</h1><p class="sub">Tantangan tebak skor Piala Dunia 2026.</p></div></div><form class="form" id="login"><p class="note ${registrationClosed()?"locked":"open"}">${registrationInfo}</p><label>Nama peserta<input name="name" required autocomplete="name" placeholder="contoh: nama peserta"></label><label>Password<input name="password" required type="password" placeholder="password"></label><label>No handphone<input name="phone" required autocomplete="tel" placeholder="+628xxxxxxxxxx"></label><button class="btn">Masuk / Daftar</button></form></section></section></main>`;document.querySelector("#login").addEventListener("submit",login);bindLoginStepPopups();startCountdown()}
    function shell(content){clearInterval(countdownTimer);startHeartbeat();let me=rows().find(r=>r.name===state.user.name),navItems=state.user.role==="viewer"?["jadwal","klasemen","hasil","rekap","referensi"]:["prediksi","jadwal","klasemen","hasil","rekap","notifikasi","referensi"];root.innerHTML=`<main class="app"><header class="top"><div class="brand"><div class="mark">M26</div><div><h1>Martebak26</h1><p class="sub">Skor tepat +3, arah pemenang/seri tepat +1, ranking sampai final 19 Juli 2026.</p></div></div><div class="userbar"><span class="pill"><span class="online-dot ${isOnline(state.user.name)?"on":""}" data-online-name="${esc(state.user.name)}"></span>${esc(state.user.name)} ${state.user.role==="viewer"?"viewer":(me?`#${me.rank} (${me.points} poin)`:"admin")}</span><button class="btn secondary" id="logout">Keluar</button></div></header><nav class="nav">${navItems.map(p=>`<button class="tab ${state.page===p?"active":""}" data-page="${p}">${p}</button>`).join("")}${state.user.role==="admin"?`<button class="tab ${state.page==="admin"?"active":""}" data-page="admin">admin skor</button>`:""}</nav>${content}</main>${tickerHtml()}`;document.querySelector("#logout").onclick=logout;document.querySelectorAll("[data-page]").forEach(b=>b.onclick=()=>{state.page=b.dataset.page;["klasemen","hasil","rekap","notifikasi"].includes(state.page)?loadRemote().then(render):render()});paintOnlineDots();paintTicker()}
    function klasemen(){let r=rows();shell(`<section class="card"><div class="head"><h2>Klasemen dan Peserta Terdaftar</h2><button class="btn secondary" id="refreshRows">Muat Ulang Peserta</button><span class="pill">${r.length} peserta</span></div><div class="body note">Ranking memakai akumulasi poin: skor tepat +3, arah pemenang/seri tepat +1.</div><table><thead><tr><th>Rank</th><th>Peserta</th><th>Status</th><th>Prediksi</th><th>Skor Tepat</th><th>Arah Tepat</th><th>Salah</th><th>Poin</th></tr></thead><tbody>${r.length?r.map(x=>`<tr><td>#${x.rank}</td><td><span class="online-dot ${isOnline(x.name)?"on":""}" data-online-name="${esc(x.name)}"></span>${esc(x.name)}</td><td><span data-online-text="${esc(x.name)}" class="${isOnline(x.name)?"ok":"wait"}">${isOnline(x.name)?"Online":"Offline"}</span></td><td>${x.total}</td><td>${x.correct}</td><td>${x.outcome}</td><td>${x.wrong}</td><td><b>${x.points}</b></td></tr>`).join(""):`<tr><td colspan="8" class="wait">Belum ada peserta terdaftar.</td></tr>`}</tbody></table></section>`);document.querySelector("#refreshRows").onclick=()=>loadRemote().then(render)}
    function notif(){if(state.user.role==="viewer"){state.page="jadwal";return jadwal()}let personal=state.notif.filter(n=>n.user===state.user.name),up=allMatches().filter(m=>!state.actual[m.id]?.final).slice(0,6);shell(`<section class="grid"><div class="card"><div class="head"><h2>Notifikasi Web</h2><span class="pill">${personal.length} notifikasi</span></div><div class="body stack">${(personal.length?personal:[{text:"Belum ada notifikasi web untuk akun ini."}]).map(n=>`<p class="note">${esc(n.text)}</p>`).join("")}</div></div><aside class="card"><div class="head"><h2>Pengingat Jadwal</h2></div><div class="body stack">${up.map(m=>`<p class="note">${m.date} ${m.time} WIB · ${teamLabel(m.home)} vs ${teamLabel(m.away)}</p>`).join("")}</div></aside></section>`)}
    async function saveMessage(e){e.preventDefault();let text=new FormData(e.target).get("message").trim();try{let r=await fetch("/api/messages",{method:"POST",headers:{"Content-Type":"application/json",...authHeaders()},body:JSON.stringify({text})}),d=await r.json();if(!r.ok)return pop(d.error||"Pesan gagal disimpan");state.messages=d.messages||state.messages;write(store.messages,state.messages);e.target.reset();paintTicker();pop("Pesan running text tersimpan 1 hari")}catch{pop("Pesan gagal dikirim ke server")}}
    function admin(){if(state.user.role!=="admin")return prediksi();shell(`<section class="card"><div class="head"><h2>Pesan Running Text</h2><span class="pill">hilang otomatis 1 hari</span></div><div class="body"><p class="note">Tulis pengumuman untuk peserta. Pesan tampil berjalan di bagian bawah aplikasi untuk semua akun.</p><form id="messageForm" class="message-form"><input name="message" maxlength="240" required placeholder="Tulis pesan untuk peserta"><button class="btn">Kirim Pesan</button></form></div></section><section class="card" style="margin-top:16px"><div class="head"><h2>Sync Jadwal dan Update Skor Aktual</h2><div class="tools"><button class="btn secondary" id="syncFifa">Sync Jadwal / Skor</button><button class="btn secondary" id="syncScore">Sync Skor Sekarang</button><button class="btn secondary" id="syncMarket">Sync Prediksi Pasaran</button></div><span class="pill">admin</span></div><div class="body note">Server otomatis menyinkronkan jadwal, skor aktual, dan prediksi pasaran. Prediksi pasaran ditampilkan sebagai referensi skor pasar, bukan ajakan taruhan.</div><form id="actualForm" class="body">${allMatches().map(m=>{let a=state.actual[m.id]||{};return `<div class="admin-row"><label>#${esc(m.matchNumber||m.id)} ${teamLabel(m.home)} vs ${teamLabel(m.away)}<span class="meta">${m.date} ${m.time||""} ${m.timezone||"WIB"} · ${esc(m.phase||m.group)} · ${esc(m.venue||"")}</span><span class="meta">${marketText(m)}</span></label><label>Home<input name="${m.id}-ah" type="number" min="0" max="99" value="${a.home??""}"></label><label>Away<input name="${m.id}-aa" type="number" min="0" max="99" value="${a.away??""}"></label><label><input name="${m.id}-fin" type="checkbox" ${a.final?"checked":""}> Final</label></div>`}).join("")}<button class="btn">Simpan Skor Aktual dan Hitung Poin</button></form></section>`);document.querySelector("#messageForm").addEventListener("submit",saveMessage);document.querySelector("#actualForm").addEventListener("submit",saveActual);document.querySelector("#syncFifa").onclick=runSync;document.querySelector("#syncScore").onclick=runScoreSync;document.querySelector("#syncMarket").onclick=runMarket}
    function render(){if(!state.user)return loginView();if(state.user.role==="viewer"&&["prediksi","notifikasi","admin"].includes(state.page))state.page="jadwal";({prediksi,jadwal,summary:summaryPage,klasemen,hasil,rekap,notifikasi:notif,referensi,admin}[state.page]||prediksi)()}
    loadRemote().then(()=>{if(state.token){bindIdleEvents();lastActivityAt=Date.now()}startHeartbeat();render()});
  </script>
